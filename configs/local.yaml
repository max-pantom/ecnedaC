runtime:
  profile: local
  device: cpu
  seed: 1337
  allow_unsafe_local: false
  max_samples: 4
  epochs: 1
  num_workers: 0
  microbatch_size: 1
  contrastive_group_size: 2
data:
  clip_seconds: 2.0
  num_frames: 8
  frame_size: 64
  sample_rate: 16000
  n_mels: 64
  n_fft: 512
  hop_length: 160
  split: train
encoders:
  video_base_channels: 8
  audio_base_channels: 8
  embed_dim: 64
  projection_dim: 32
  sequence_length: 4
training:
  learning_rate: 0.0003
  weight_decay: 0.0001
  temperature: 0.07
  checkpoint_interval_seconds: 600
  max_steps: 1
paths:
  manifest_path: null
  checkpoint_dir: artifacts/checkpoints
  report_dir: artifacts/reports
  intake_root: data/intake
dataset_intake:
  maximum_working_storage_gb: 20.0
  minimum_free_disk_gb: 15.0
  unknown_download_reservation_gb: 2.0
  segment_min_seconds: 4.0
  segment_max_seconds: 10.0
  segment_target_seconds: 6.0
  maximum_suggestions_per_source: 12
  ffmpeg_binary: ffmpeg
  ffprobe_binary: ffprobe
remote: &remote
  provider: runpod
  manifest_uri: s3://cadence-placeholder/manifests/train.jsonl
  checkpoint_uri: s3://cadence-placeholder/checkpoints/
  requested_hardware: NVIDIA RTX A5000 24GB
  dependency_group: training-gpu
  python_version: "3.12"
  maximum_budget_usd: 2.0
  maximum_runtime_minutes: 240
  synthetic_smoke_maximum_budget_usd: 1.0
  synthetic_smoke_maximum_runtime_minutes: 30
  maximum_hourly_price_usd: 0.30
  runpod_gpu_type_id: NVIDIA RTX A5000
  runpod_gpu_count: 1
  runpod_cloud_type: COMMUNITY
  runpod_image_name: pytorch/pytorch:2.11.0-cuda12.6-cudnn9-devel
  runpod_container_disk_gb: 50
  runpod_volume_gb: 0
  runpod_pod_name: cadence-bounded-a5000
  vps_host: null
  vast_instance_id: null
