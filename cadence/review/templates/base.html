<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>{% block title %}Cadence review{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/review.css') }}">
    <script defer src="{{ url_for('static', path='/review.js') }}"></script>
  </head>
  <body>
    <header>
      <a class="brand" href="/">Cadence private review</a>
      {% if session %}
      <div>
        <span>Signed in as {{ session.actor }}</span>
        <span class="status-badge status-{{ session.role }}">{{ session.role }}</span>
        <form method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button type="submit">Sign out</button>
        </form>
      </div>
      {% endif %}
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
