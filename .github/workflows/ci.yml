name: Local readiness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --group operations-ui
      - name: Private-data policy
        run: uv run cadence data-policy check
      - name: Ruff
        run: uv run ruff check .
      - name: Strict Mypy
        run: uv run mypy cadence
      - name: Pytest
        run: uv run --group operations-ui pytest
      - name: Synthetic optimization and checkpoint inspection
        run: |
          uv run cadence train-synthetic \
            --config configs/test.yaml \
            --checkpoint artifacts/checkpoints/ci-acceptance.pt
          uv run cadence checkpoint-inspect artifacts/checkpoints/ci-acceptance.pt

  gpu-dependency-resolution:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv lock --check
      - run: python scripts/verify_gpu_dependencies.py
